name: LUPI CI

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tools/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tools/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'

concurrency:
  group: lupi-live-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Rebuild catalog and fail on drift
        run: |
          npm run nist:build
          if ! git -C "$GITHUB_WORKSPACE" diff --quiet -- apps/web/public/nist; then
            echo "::error::Committed NIST catalog is stale. Run 'npm run nist:build' and commit the result."
            git -C "$GITHUB_WORKSPACE" diff -- apps/web/public/nist
            exit 1
          fi
          echo "NIST catalog is in sync with committed source."

  streaming-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Stream a small GCS .glimbin
        run: npm run verify:streaming

  gallery-e2e:
    runs-on: ubuntu-latest
    needs: build-test
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start dev server
        run: |
          nohup pnpm --filter @atlas/web exec vite --port 3000 --strictPort > /tmp/dev.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://localhost:3000/ && echo "dev up after ${i}s" && break
            sleep 2
          done

      - name: Run gallery UI harness
        timeout-minutes: 6
        run: node tools/verify-gallery.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-e2e-screenshots
          path: .verify-artifacts/
          if-no-files-found: ignore

      - name: Dump dev server log on failure
        if: failure()
        run: tail -50 /tmp/dev.log || true
