name: LUPI CI

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tools/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tools/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'

concurrency:
  group: lupi-live-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Rebuild catalog and fail on drift
        run: |
          npm run nist:build
          if ! git -C "$GITHUB_WORKSPACE" diff --quiet -- apps/web/public/nist; then
            echo "::error::Committed NIST catalog is stale. Run 'npm run nist:build' and commit the result."
            git -C "$GITHUB_WORKSPACE" diff -- apps/web/public/nist
            exit 1
          fi
          echo "NIST catalog is in sync with committed source."
